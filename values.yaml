# Namespace where Longhorn is installed. RecurringJobs MUST live here.
longhornNamespace: longhorn-system

# Longhorn recurring-job-group these jobs target.
#
# Volumes whose StorageClass has no `recurringJobSelector` parameter are
# auto-labeled by Longhorn with `recurring-job-group.longhorn.io/default=enabled`.
# Targeting `default` therefore covers every volume on the cluster that hasn't
# been opted into a more specific group — which for a Nebari deployment is
# usually exactly what you want (user home dirs, hub state, etc.).
#
# Use a dedicated group name (e.g. `nebari`) plus `storageClass.enabled: true`
# below if you want the chart to provide its own paired StorageClass.
targetGroup: default

# Optional paired StorageClass that auto-enrolls its volumes into `targetGroup`
# via the `recurringJobSelector` parameter. Disabled by default because, when
# `targetGroup: default`, the cluster's default StorageClass already covers
# every volume — emitting a second SC adds no value.
storageClass:
  enabled: false
  name: longhorn-jhub
  numberOfReplicas: 3
  reclaimPolicy: Delete
  fsType: ext4

snapshot:
  enabled: true
  cron: "0 * * * *"                # hourly
  retain: 24                       # 24h rolling window
  concurrency: 5

backup:
  enabled: true
  cron: "0 3 * * *"                # daily 03:00
  retain: 30                       # ~1 month
  concurrency: 3                   # don't saturate node uplink

# Cluster-wide Longhorn settings managed by this chart.
#
# allowRecurringJobWhileVolumeDetached: with Longhorn's stock default ("false"),
# RecurringJobs silently skip detached volumes. JupyterHub user PVCs are routinely
# detached when servers idle out, so the chart defaults this to "true" — Longhorn
# briefly auto-attaches the volume to take the snapshot/backup, then detaches it
# again. Set to null to leave Longhorn's existing setting untouched.
#
# NOTE: cluster-wide. Affects every RecurringJob on the cluster, not just this chart's.
clusterSettings:
  allowRecurringJobWhileVolumeDetached: true

# Optional: extra labels/annotations applied to all rendered resources.
commonLabels: {}
commonAnnotations: {}
